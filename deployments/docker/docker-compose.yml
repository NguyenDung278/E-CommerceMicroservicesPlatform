services:
  # Database services
  postgres:
    image: postgres:15-alpine
    container_name: ecommerce-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-db-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  # RabbitMQ for message queuing
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: ecommerce-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-change-me-rabbitmq-password}
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  # Jaeger for distributed tracing
  jaeger:
    image: jaegertracing/all-in-one:1.49
    container_name: ecommerce-jaeger
    ports:
      - "5775:5775/udp"
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686" # Jaeger UI
      - "14268:14268"
      - "14250:14250"
    environment:
      COLLECTOR_OTLP_ENABLED: true
    networks:
      - ecommerce-network

  # Prometheus for monitoring
  prometheus:
    image: prom/prometheus:v2.46.0
    container_name: ecommerce-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-admin-api'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network
    depends_on:
      user-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      cart-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy

  # Grafana for visualization
  grafana:
    image: grafana/grafana:10.1.0
    container_name: ecommerce-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-me-grafana-password}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://admin:password123@localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network
    depends_on:
      - prometheus

  # Nginx as Edge Proxy / Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: ecommerce-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - ecommerce-network

  # API Gateway (Go)
  api-gateway:
    build:
      context: ../..
      dockerfile: api-gateway/Dockerfile
    container_name: ecommerce-api-gateway
    ports:
      - "8080:8080" # Can keep this exposed for direct access if needed, or remove to force going through Nginx
    environment:
      CONFIG_PATH: /config/config.yaml
      JWT_SECRET: ${JWT_SECRET:-change-me-jwt-secret-at-least-32-chars}
    volumes:
      - ./config/api-gateway.yaml:/config/config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network
    depends_on:
      user-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      cart-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy

  # User Service
  user-service:
    build:
      context: ../..
      dockerfile: services/user-service/Dockerfile
    container_name: ecommerce-user-service
    ports:
      - "8081:8081"   # HTTP
      - "50051:50051" # gRPC
    environment:
      CONFIG_PATH: /config/config.yaml
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-change-me-db-password}
      JWT_SECRET: ${JWT_SECRET:-change-me-jwt-secret-at-least-32-chars}
    volumes:
      - ./config/user-service.yaml:/config/config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - jaeger

  # Product Service
  product-service:
    build:
      context: ../..
      dockerfile: services/product-service/Dockerfile
    container_name: ecommerce-product-service
    ports:
      - "8082:8082"   # HTTP
      - "50052:50052" # gRPC
    environment:
      CONFIG_PATH: /config/config.yaml
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-change-me-db-password}
      JWT_SECRET: ${JWT_SECRET:-change-me-jwt-secret-at-least-32-chars}
    volumes:
      - ./config/product-service.yaml:/config/config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - jaeger

  # Cart Service
  cart-service:
    build:
      context: ../..
      dockerfile: services/cart-service/Dockerfile
    container_name: ecommerce-cart-service
    ports:
      - "8083:8083"
    environment:
      CONFIG_PATH: /config/config.yaml
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-change-me-jwt-secret-at-least-32-chars}
    volumes:
      - ./config/cart-service.yaml:/config/config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - jaeger

  # Order Service
  order-service:
    build:
      context: ../..
      dockerfile: services/order-service/Dockerfile
    container_name: ecommerce-order-service
    ports:
      - "8084:8084"
    environment:
      CONFIG_PATH: /config/config.yaml
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-change-me-db-password}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-change-me-rabbitmq-password}
      JWT_SECRET: ${JWT_SECRET:-change-me-jwt-secret-at-least-32-chars}
    volumes:
      - ./config/order-service.yaml:/config/config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - jaeger

  # Payment Service
  payment-service:
    build:
      context: ../..
      dockerfile: services/payment-service/Dockerfile
    container_name: ecommerce-payment-service
    ports:
      - "8085:8085"
    environment:
      CONFIG_PATH: /config/config.yaml
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-change-me-db-password}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-change-me-rabbitmq-password}
      JWT_SECRET: ${JWT_SECRET:-change-me-jwt-secret-at-least-32-chars}
    volumes:
      - ./config/payment-service.yaml:/config/config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - jaeger

  # Notification Service
  notification-service:
    build:
      context: ../..
      dockerfile: services/notification-service/Dockerfile
    container_name: ecommerce-notification-service
    ports:
      - "8086:8086"
    environment:
      CONFIG_PATH: /config/config.yaml
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-change-me-rabbitmq-password}
    volumes:
      - ./config/notification-service.yaml:/config/config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8086/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - jaeger

# Volumes for persistent data
volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  prometheus-data:
  grafana-data:

# Network for service communication
networks:
  ecommerce-network:
    driver: bridge
    name: ecommerce-network
