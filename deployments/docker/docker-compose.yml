services:
  # Database services
  postgres:
    image: postgres:15-alpine
    container_name: ecommerce-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-db-password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  # RabbitMQ for message queuing
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: ecommerce-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-change-me-rabbitmq-password}
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  # MinIO for product image object storage
  minio:
    image: minio/minio:latest
    container_name: ecommerce-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  # Jaeger for distributed tracing
  jaeger:
    image: jaegertracing/all-in-one:1.49
    container_name: ecommerce-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: true
    ports:
      - "16686:16686"
      - "4318:4318"
    networks:
      - ecommerce-network

  # Elasticsearch for advanced catalog search
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    container_name: ecommerce-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - ecommerce-network

  # Prometheus for monitoring
  prometheus:
    image: prom/prometheus:v2.46.0
    container_name: ecommerce-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-admin-api'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network
    depends_on:
      user-service:
        condition: service_started
      product-service:
        condition: service_started
      cart-service:
        condition: service_started
      order-service:
        condition: service_started
      payment-service:
        condition: service_started
      notification-service:
        condition: service_started

  # Grafana for visualization
  grafana:
    image: grafana/grafana:10.1.0
    container_name: ecommerce-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-me-grafana-password}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --user=$${GF_SECURITY_ADMIN_USER:-admin} --password=$${GF_SECURITY_ADMIN_PASSWORD:-change-me-grafana-password} http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network
    depends_on:
      - prometheus

  # Nginx as Edge Proxy / Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: ecommerce-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api-gateway:
        condition: service_started
      frontend:
        condition: service_started
    networks:
      - ecommerce-network

  # Primary local UI path. The Next.js client remains experimental and is not
  # part of the default Compose runtime yet.
  frontend:
    build:
      context: ../..
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    container_name: ecommerce-frontend
    ports:
      - "4173:80"
    networks:
      - ecommerce-network

  # API Gateway (Go)
  api-gateway:
    build:
      context: ../..
      dockerfile: api-gateway/Dockerfile
    container_name: ecommerce-api-gateway
    ports:
      - "8080:8080" # Can keep this exposed for direct access if needed, or remove to force going through Nginx
    environment:
      CONFIG_PATH: /config/config.yaml
      JWT_SECRET: ${JWT_SECRET:-change-me-jwt-secret-at-least-32-chars}
    volumes:
      - ./config/api-gateway.yaml:/config/config.yaml
    networks:
      - ecommerce-network
    depends_on:
      user-service:
        condition: service_started
      product-service:
        condition: service_started
      cart-service:
        condition: service_started
      order-service:
        condition: service_started
      payment-service:
        condition: service_started

  # User Service
  user-service:
    build:
      context: ../..
      dockerfile: services/user-service/Dockerfile
    container_name: ecommerce-user-service
    environment:
      CONFIG_PATH: /config/config.yaml
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-change-me-db-password}
      JWT_SECRET: ${JWT_SECRET:-change-me-jwt-secret-at-least-32-chars}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:4173}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-ND Shop}
      SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:-}
      OAUTH_GOOGLE_CLIENT_ID: ${OAUTH_GOOGLE_CLIENT_ID:-}
      OAUTH_GOOGLE_CLIENT_SECRET: ${OAUTH_GOOGLE_CLIENT_SECRET:-}
      OAUTH_GOOGLE_REDIRECT_URL: ${OAUTH_GOOGLE_REDIRECT_URL:-http://localhost:8080/api/v1/auth/oauth/google/callback}
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_API_BASE_URL: ${TELEGRAM_API_BASE_URL:-https://api.telegram.org}
      TELEGRAM_OTP_MESSAGE_TTL_SECONDS: ${TELEGRAM_OTP_MESSAGE_TTL_SECONDS:-300}
      TELEGRAM_OTP_RESEND_COOLDOWN_SECONDS: ${TELEGRAM_OTP_RESEND_COOLDOWN_SECONDS:-60}
      TELEGRAM_OTP_MAX_ATTEMPTS: ${TELEGRAM_OTP_MAX_ATTEMPTS:-5}
      TELEGRAM_OTP_DAILY_LIMIT_PER_USER: ${TELEGRAM_OTP_DAILY_LIMIT_PER_USER:-5}
      TELEGRAM_OTP_HOURLY_LIMIT_PER_IP: ${TELEGRAM_OTP_HOURLY_LIMIT_PER_IP:-10}
      TELEGRAM_SECRET_PEPPER: ${TELEGRAM_SECRET_PEPPER:-change-me}
    volumes:
      - ./config/user-service.yaml:/config/config.yaml
    networks:
      - ecommerce-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      jaeger:
        condition: service_started

  # Product Service
  product-service:
    build:
      context: ../..
      dockerfile: services/product-service/Dockerfile
    container_name: ecommerce-product-service
    environment:
      CONFIG_PATH: /config/config.yaml
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-change-me-db-password}
      JWT_SECRET: ${JWT_SECRET:-change-me-jwt-secret-at-least-32-chars}
    volumes:
      - ./config/product-service.yaml:/config/config.yaml
    networks:
      - ecommerce-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_started
      jaeger:
        condition: service_started

  # Cart Service
  cart-service:
    build:
      context: ../..
      dockerfile: services/cart-service/Dockerfile
    container_name: ecommerce-cart-service
    environment:
      CONFIG_PATH: /config/config.yaml
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-change-me-jwt-secret-at-least-32-chars}
    volumes:
      - ./config/cart-service.yaml:/config/config.yaml
    networks:
      - ecommerce-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      jaeger:
        condition: service_started

  # Order Service
  order-service:
    build:
      context: ../..
      dockerfile: services/order-service/Dockerfile
    container_name: ecommerce-order-service
    environment:
      CONFIG_PATH: /config/config.yaml
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-change-me-db-password}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-change-me-rabbitmq-password}
      JWT_SECRET: ${JWT_SECRET:-change-me-jwt-secret-at-least-32-chars}
    volumes:
      - ./config/order-service.yaml:/config/config.yaml
    networks:
      - ecommerce-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      jaeger:
        condition: service_started

  # Payment Service
  payment-service:
    build:
      context: ../..
      dockerfile: services/payment-service/Dockerfile
    container_name: ecommerce-payment-service
    environment:
      CONFIG_PATH: /config/config.yaml
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-change-me-db-password}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-change-me-rabbitmq-password}
      JWT_SECRET: ${JWT_SECRET:-change-me-jwt-secret-at-least-32-chars}
    volumes:
      - ./config/payment-service.yaml:/config/config.yaml
    networks:
      - ecommerce-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      jaeger:
        condition: service_started

  # Notification Service
  notification-service:
    build:
      context: ../..
      dockerfile: services/notification-service/Dockerfile
    container_name: ecommerce-notification-service
    environment:
      CONFIG_PATH: /config/config.yaml
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-change-me-rabbitmq-password}
    volumes:
      - ./config/notification-service.yaml:/config/config.yaml
    networks:
      - ecommerce-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      jaeger:
        condition: service_started

# Volumes for persistent data
volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  minio-data:
  elasticsearch-data:
  prometheus-data:
  grafana-data:

# Network for service communication
networks:
  ecommerce-network:
    driver: bridge
    name: ecommerce-network
