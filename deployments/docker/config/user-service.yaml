server:
  port: "8081"
  host: "0.0.0.0"

database:
  host: "postgres"
  port: "5432"
  user: "admin"
  dbname: "ecommerce_user"
  sslmode: "disable"

redis:
  host: "redis"
  port: "6379"
  db: 0

tracing:
  enabled: true
  endpoint: "http://jaeger:4318"
  sample_ratio: 1.0

jwt:
  expiration: 24

grpc:
  port: "50051"

frontend:
  base_url: "http://localhost:4173"

oauth:
  google:
    redirect_url: "http://localhost:8080/api/v1/auth/oauth/google/callback"

telegram:
  enabled: false
  api_base_url: "https://api.telegram.org"
  otp_message_ttl_seconds: 300
  otp_resend_cooldown_seconds: 60
  otp_max_attempts: 5
  otp_daily_limit_per_user: 5
  otp_hourly_limit_per_ip: 10
  secret_pepper: "change-me"

bootstrap:
  dev_accounts:
    enabled: true
