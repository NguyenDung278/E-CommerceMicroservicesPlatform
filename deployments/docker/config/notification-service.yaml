server:
  port: "8086"
  host: "0.0.0.0"

redis:
  host: "redis"
  port: "6379"
  db: 0

notification:
  worker_count: 4
  prefetch_count: 8
  max_retries: 5
  retry_delay_seconds: 30
  inbox_ttl_hours: 168
  processing_ttl_seconds: 300
  queue_metrics_interval_seconds: 15

rabbitmq:
  host: "rabbitmq"
  port: "5672"
  user: "admin"

tracing:
  enabled: true
  endpoint: "http://jaeger:4318"
  sample_ratio: 1.0

smtp:
  host: ""
  port: "587"
  username: ""
  from_name: "ND Shop"
  from_address: ""
