name: ci

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  repo-safety:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Ensure local env files are not tracked
        run: |
          if git ls-files --error-unmatch .env >/dev/null 2>&1; then
            echo ".env must never be tracked"
            exit 1
          fi
          if git ls-files --error-unmatch .env.local >/dev/null 2>&1; then
            echo ".env.local must never be tracked"
            exit 1
          fi

  go-checks:
    runs-on: ubuntu-latest
    needs: repo-safety
    strategy:
      fail-fast: false
      matrix:
        module:
          - pkg
          - api-gateway
          - proto
          - services/user-service
          - services/product-service
          - services/cart-service
          - services/order-service
          - services/payment-service
          - services/notification-service

    defaults:
      run:
        working-directory: ${{ matrix.module }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.module }}/go.mod
          cache: true

      - name: Download deps
        run: go mod download

      - name: Check formatting
        run: |
          files=$(find . -name '*.go' -print)
          if [ -n "$files" ]; then
            test -z "$(gofmt -l $files)"
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  frontend-checks:
    runs-on: ubuntu-latest
    needs: repo-safety
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test frontend api contracts
        run: npm run test -- --run

      - name: Build frontend
        run: npm run build

  client-checks:
    runs-on: ubuntu-latest
    needs: repo-safety
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint client
        run: npm run lint

      - name: Build client
        run: npm run build
