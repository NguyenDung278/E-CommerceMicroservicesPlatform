<main class="min-h-screen flex items-center justify-center px-6 pt-20">
<!-- Recovery Card -->
<div class="w-full max-w-md bg-surface-container-lowest p-12 rounded-xl transition-all duration-300">

<h2 class="font-headline text-3xl font-bold text-primary mb-3">Recover Password</h2>
<p class="text-on-surface-variant font-body text-sm leading-relaxed">

                </p>

<form class="space-y-12">
<div class="group relative">

<input class="w-full bg-transparent border-0 border-b border-outline-variant py-3 px-0 focus:ring-0 focus:border-primary transition-colors placeholder:text-outline-variant text-on-surface" id="email" placeholder="your@email.com" type="email"/>
</div>
<div class="space-y-6">
<!-- Primary CTA with Design System Gradient -->
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-label font-medium py-4 px-6 rounded-lg shadow-sm hover:opacity-90 active:scale-[0.98] transition-all duration-300" type="submit">
                        Send Verification Code
                    </button>
<!-- Back to Login Link -->
<div class="text-center">
<a class="inline-flex items-center gap-2 text-xs font-label uppercase tracking-widest text-on-surface-variant hover:text-primary transition-colors group" href="#">
<span class="material-symbols-outlined text-sm">arrow_back</span>
<span class="border-b border-transparent group-hover:border-primary">Back to Login</span>
</a>
</div>
</div>
</form>
</div>
</main>
<!-- Footer -->

<div class="flex flex-col md:flex-row justify-between items-center px-12 gap-6 max-w-screen-2xl mx-auto">
