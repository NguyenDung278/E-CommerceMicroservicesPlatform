<!DOCTYPE html>

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

            background: rgba(251, 249, 244, 0.8);
            backdrop-filter: blur(20px);
        }

<body class="bg-background font-body text-on-surface flex flex-col min-h-screen">
<!-- TopAppBar -->
<header class="w-full top-0 sticky bg-[#fbf9f4] dark:bg-[#1b1c19] z-50">
<div class="flex justify-between items-center px-6 py-4 max-w-7xl mx-auto">
<div class="font-noto-serif italic font-bold text-[#061b0e] dark:text-[#fbf9f4] text-2xl tracking-tighter">
                ND Shop
            </div>
<div class="flex items-center gap-4">
<button class="text-[#575d79] dark:text-[#a1a3af] hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined">help_outline</span>
</button>
</div>
</div>
<div class="bg-[#f5f3ee] dark:bg-[#252623] h-[1px] w-full"></div>
</header>
<main class="flex-grow flex flex-col md:flex-row items-stretch justify-center">
<!-- Editorial Image Side (Asymmetric Layout) -->
<div class="hidden md:flex md:w-5/12 lg:w-1/2 relative overflow-hidden bg-primary-container">
<img alt="Minimalist design interior with forest colors" class="absolute inset-0 w-full h-full object-cover opacity-60" data-alt="Deep green aesthetic architectural interior space" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCuq5NK1Iy3PTOGJZLn4oXTOfO1RbvRu1h2r2voXotlS7SllZSUWggSVyRcrAYs9o5cSvyOfMlmdbfxp9q8Jocm-h7-nSgxSe0xT9uFCF14Vb8nWxyQ61CxRcWDodKs6r95qS0t5G7r4hxvMXA4hXlQc2FTZ-_dkwQmH-qFKrCf1PMgdkrLmMqF_ERFHoFZGVIErG1aNnDUqhkAj4WW2TbPIxM72zqnFozALMJgHXw2ACdnEo07mNw6zCcrH5YEvpVRqSvlfHiFumbh"/>
<div class="relative z-10 p-16 flex flex-col justify-end h-full text-on-primary">
<p class="font-headline text-display-lg text-4xl lg:text-5xl leading-tight mb-6">
                    Join the <span class="italic">Atelier</span> of Curated Essentials.
                </p>
<p class="font-body text-lg opacity-80 max-w-sm">
                    Experience a sanctuary of quality, crafted for the modern aesthetic.
                </p>
</div>
</div>
<!-- Registration Form Section -->
<div class="w-full md:w-7/12 lg:w-1/2 flex items-center justify-center p-8 md:p-16 lg:p-24 bg-surface">
<div class="w-full max-w-md">
<div class="mb-12">
<h1 class="font-headline text-4xl font-bold tracking-tight text-primary mb-2">Create Account</h1>
<p class="text-secondary font-body">Begin your journey with ND Shop.</p>
</div>
<form class="space-y-8">
<div class="space-y-6">
<!-- Full Name -->
<div class="relative">
<label class="block text-xs font-semibold uppercase tracking-widest text-secondary mb-1">Full Name</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant focus:border-primary focus:ring-0 px-0 py-3 transition-all duration-300 placeholder:text-outline/50" placeholder="Julianna Thorne" type="text"/>
</div>
<!-- Email -->
<div class="relative">
<label class="block text-xs font-semibold uppercase tracking-widest text-secondary mb-1">Email</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant focus:border-primary focus:ring-0 px-0 py-3 transition-all duration-300 placeholder:text-outline/50" placeholder="hello@example.com" type="email"/>
</div>
<!-- Phone Number -->
<div class="relative">
<label class="block text-xs font-semibold uppercase tracking-widest text-secondary mb-1">Phone Number</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant focus:border-primary focus:ring-0 px-0 py-3 transition-all duration-300 placeholder:text-outline/50" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
<!-- Password -->
<div class="relative">
<label class="block text-xs font-semibold uppercase tracking-widest text-secondary mb-1">Password</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant focus:border-primary focus:ring-0 px-0 py-3 transition-all duration-300 placeholder:text-outline/50" placeholder="••••••••" type="password"/>
</div>
<!-- Confirm Password -->
<div class="relative">
<label class="block text-xs font-semibold uppercase tracking-widest text-secondary mb-1">Confirm Password</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant focus:border-primary focus:ring-0 px-0 py-3 transition-all duration-300 placeholder:text-outline/50" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-3">
<div class="flex items-center h-5">
<input class="h-4 w-4 rounded border-outline-variant text-primary focus:ring-primary/20" id="terms" type="checkbox"/>
</div>
<label class="text-sm text-secondary leading-tight" for="terms">
                            Agree to Terms &amp; Privacy
                        </label>
</div>
<!-- Register Button -->
<button class="w-full py-4 bg-gradient-to-br from-primary to-primary-container text-on-primary font-medium rounded-lg hover:opacity-90 active:scale-[0.98] transition-all duration-200 shadow-xl shadow-primary/5" type="submit">
                        Register
                    </button>
<!-- Login Link -->
<div class="text-center pt-4">
<p class="text-sm text-secondary">
                            Already have an account? 
                            <a class="text-primary font-semibold hover:text-on-tertiary-container transition-colors ml-1" href="#">Login</a>
</p>
</div>
</form>
</div>
</div>
</main>
<!-- Footer -->
<footer class="w-full mt-auto bg-[#f5f3ee] dark:bg-[#1b1c19]">
<div class="flex flex-col md:flex-row justify-between items-center px-10 py-12 gap-6 w-full max-w-7xl mx-auto">
<div class="font-noto-serif text-lg text-[#061b0e]">ND Shop</div>
<nav class="flex flex-wrap justify-center gap-8">
<a class="font-inter text-xs tracking-wide uppercase text-[#575d79] dark:text-[#a1a3af] hover:text-[#8d4c32] transition-colors" href="#">Privacy Policy</a>
<a class="font-inter text-xs tracking-wide uppercase text-[#575d79] dark:text-[#a1a3af] hover:text-[#8d4c32] transition-colors" href="#">Terms of Service</a>
<a class="font-inter text-xs tracking-wide uppercase text-[#575d79] dark:text-[#a1a3af] hover:text-[#8d4c32] transition-colors" href="#">Contact Support</a>
</nav>
<div class="font-inter text-xs tracking-wide uppercase text-[#575d79] dark:text-[#a1a3af]">
                © 2024 ND Shop. All rights reserved.
            </div>
</div>
</footer>
</body></html>
