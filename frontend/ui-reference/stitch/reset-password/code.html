<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .serif-heading {
            font-family: 'Noto Serif', serif;
        }
        .body-inter {
            font-family: 'Inter', sans-serif;
        }
        /* Custom Ambient Shadow from Design System */
        .ambient-shadow {
            box-shadow: 0 24px 48px -12px rgba(27, 28, 25, 0.08);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "secondary-fixed-dim": "#bfc5e5",
                "primary-container": "#1b3022",
                "tertiary-fixed": "#ffdbd0",
                "surface": "#fbf9f4",
                "on-tertiary-fixed-variant": "#73341f",
                "on-tertiary-fixed": "#390b00",
                "secondary-container": "#d9deff",
                "surface-tint": "#4d6453",
                "outline": "#737973",
                "surface-container-high": "#eae8e3",
                "error": "#ba1a1a",
                "on-secondary-fixed": "#141a32",
                "background": "#fbf9f4",
                "on-primary-fixed-variant": "#364c3c",
                "inverse-on-surface": "#f2f1ec",
                "surface-variant": "#e4e2dd",
                "on-tertiary-container": "#d07d63",
                "surface-container-highest": "#e4e2dd",
                "on-tertiary": "#ffffff",
                "on-surface-variant": "#434843",
                "primary": "#061b0e",
                "outline-variant": "#c3c8c1",
                "inverse-primary": "#b4cdb8",
                "tertiary-container": "#501a07",
                "surface-container": "#f0eee9",
                "error-container": "#ffdad6",
                "surface-container-lowest": "#ffffff",
                "surface-container-low": "#f5f3ee",
                "on-error-container": "#93000a",
                "surface-dim": "#dbdad5",
                "on-primary-container": "#819986",
                "tertiary": "#320900",
                "tertiary-fixed-dim": "#ffb59d",
                "on-background": "#1b1c19",
                "on-secondary-container": "#5b617d",
                "on-error": "#ffffff",
                "inverse-surface": "#30312e",
                "on-secondary": "#ffffff",
                "on-primary": "#ffffff",
                "primary-fixed-dim": "#b4cdb8",
                "secondary-fixed": "#dce1ff",
                "on-primary-fixed": "#0b2013",
                "primary-fixed": "#d0e9d4",
                "surface-bright": "#fbf9f4",
                "secondary": "#575d79",
                "on-secondary-fixed-variant": "#404660",
                "on-surface": "#1b1c19"
              },
              fontFamily: {
                "headline": ["Noto Serif"],
                "body": ["Inter"],
                "label": ["Inter"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
</head>
<body class="bg-surface text-on-surface selection:bg-on-primary-container selection:text-white antialiased min-h-screen flex flex-col">
<!-- TopAppBar -->
<nav class="fixed top-0 w-full z-50 bg-[#fbf9f4]/80 dark:bg-stone-950/80 backdrop-blur-xl">
<div class="flex justify-between items-center px-8 py-6 max-w-screen-2xl mx-auto">
<div class="text-2xl font-bold tracking-tighter text-[#061b0e] dark:text-stone-100 font-['Noto_Serif'] antialiased tracking-tight">
                ND Shop
            </div>
<div class="hidden md:flex items-center gap-10">
<a class="text-stone-500 dark:text-stone-400 font-medium hover:text-[#061b0e] dark:hover:text-stone-200 transition-colors" href="#">Shop</a>
<a class="text-stone-500 dark:text-stone-400 font-medium hover:text-[#061b0e] dark:hover:text-stone-200 transition-colors" href="#">Editorial</a>
<a class="text-stone-500 dark:text-stone-400 font-medium hover:text-[#061b0e] dark:hover:text-stone-200 transition-colors" href="#">Archive</a>
</div>
<div class="flex items-center gap-6">
<button class="text-[#061b0e] dark:text-stone-100 hover:opacity-70 transition-opacity duration-300 scale-95 active:scale-100 transition-transform">
<span class="material-symbols-outlined" data-icon="shopping_bag">shopping_bag</span>
</button>
<button class="text-[#061b0e] dark:text-stone-100 hover:opacity-70 transition-opacity duration-300 scale-95 active:scale-100 transition-transform">
<span class="material-symbols-outlined" data-icon="person">person</span>
</button>
</div>
</div>
</nav>
<!-- Main Content: Reset Password Canvas -->
<main class="flex-grow flex items-center justify-center px-6 pt-32 pb-20">
<div class="w-full max-w-md bg-surface-container-lowest rounded-xl p-10 ambient-shadow">
<div class="text-center mb-10">
<h1 class="serif-heading text-4xl font-bold tracking-tight text-primary mb-3">Reset Password</h1>
<p class="body-inter text-on-surface-variant text-sm tracking-wide">Create a new secure password for your account</p>
</div>
<form class="space-y-8">
<!-- New Password Field -->
<div class="relative group">
<label class="body-inter text-[10px] uppercase tracking-widest text-on-surface-variant mb-1 block" for="new_password">New Password</label>
<div class="relative">
<input class="w-full bg-transparent border-0 border-b border-outline-variant py-3 focus:ring-0 focus:border-primary transition-all body-inter text-on-surface placeholder:text-outline-variant" id="new_password" placeholder="••••••••" type="password"/>
<button class="absolute right-0 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password Field -->
<div class="relative group">
<label class="body-inter text-[10px] uppercase tracking-widest text-on-surface-variant mb-1 block" for="confirm_password">Confirm New Password</label>
<div class="relative">
<input class="w-full bg-transparent border-0 border-b border-outline-variant py-3 focus:ring-0 focus:border-primary transition-all body-inter text-on-surface placeholder:text-outline-variant" id="confirm_password" placeholder="••••••••" type="password"/>
<button class="absolute right-0 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
<!-- Helper validation state example (Success) -->
<div class="mt-2 flex items-center gap-1.5 text-[11px] text-[#4d6453] font-medium">
<span class="material-symbols-outlined text-[14px]" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span>Passwords match</span>
</div>
</div>
<!-- Password Requirements / Information -->
<div class="bg-surface-container-low p-5 rounded-lg space-y-2">
<p class="body-inter text-[10px] uppercase tracking-widest text-on-surface-variant mb-3">Requirements</p>
<div class="flex items-center gap-3 text-xs text-on-surface-variant">
<span class="material-symbols-outlined text-[16px] text-[#4d6453]" data-icon="check">check</span>
<span>At least 8 characters</span>
</div>
<div class="flex items-center gap-3 text-xs text-on-surface-variant">
<span class="material-symbols-outlined text-[16px] text-error" data-icon="close">close</span>
<span class="text-error font-medium">One special character required</span>
</div>
</div>
<!-- Primary CTA -->
<button class="w-full py-4 px-6 rounded-lg bg-gradient-to-br from-primary to-primary-container text-on-primary font-medium tracking-wide body-inter hover:opacity-90 transition-all active:scale-[0.98] ambient-shadow" type="submit">
                    Update Password
                </button>
<!-- Cancel / Back Action -->
<div class="text-center">
<button class="body-inter text-xs font-medium text-on-surface-variant hover:text-primary transition-colors border-b-2 border-transparent hover:border-tertiary pb-0.5" type="button">
                        Back to Login
                    </button>
</div>
</form>
</div>
</main>
<!-- Footer -->
<footer class="w-full py-12 bg-[#f5f3ee] dark:bg-stone-900 mt-auto">
<div class="flex flex-col md:flex-row justify-between items-center px-12 gap-6 max-w-screen-2xl mx-auto">
<span class="font-['Inter'] text-xs tracking-widest uppercase text-[#061b0e] dark:text-stone-300">
                © 2024 ND Shop. All Rights Reserved.
            </span>
<div class="flex gap-8">
<a class="font-['Inter'] text-xs tracking-widest uppercase text-stone-400 dark:text-stone-500 hover:text-[#061b0e] dark:hover:text-stone-300 hover:underline transition-all" href="#">Privacy Policy</a>
<a class="font-['Inter'] text-xs tracking-widest uppercase text-stone-400 dark:text-stone-500 hover:text-[#061b0e] dark:hover:text-stone-300 hover:underline transition-all" href="#">Terms of Service</a>
<a class="font-['Inter'] text-xs tracking-widest uppercase text-stone-400 dark:text-stone-500 hover:text-[#061b0e] dark:hover:text-stone-300 hover:underline transition-all" href="#">Support</a>
</div>
</div>
</footer>
<!-- Image for Contextual Background Elements -->
<div class="fixed top-0 right-0 w-1/4 h-full pointer-events-none opacity-5 overflow-hidden">

</div>
</body></html>
