syntax = "proto3";

package user;

option go_package = "github.com/NguyenDung278/E-CommerceMicroservicesPlatform/proto";

// Source of truth for User gRPC contracts. Generated Go files in this
// directory are derived from this schema and should not be edited manually.

// Service definition
service UserService {
  // User registration
  rpc Register (RegisterRequest) returns (RegisterResponse);
  
  // User login
  rpc Login (LoginRequest) returns (LoginResponse);
  
  // Get user profile.
  // Intended for the currently authenticated user; the concrete auth identity
  // propagation strategy must stay aligned with the server implementation.
  rpc GetProfile (GetProfileRequest) returns (GetProfileResponse);
  
  // Update user profile.
  // Like GetProfile, this RPC is only safe when caller identity propagation is
  // well defined; request fields alone do not express that policy.
  rpc UpdateProfile (UpdateProfileRequest) returns (UpdateProfileResponse);
  
  // Get user by ID
  rpc GetUserByID (GetUserByIDRequest) returns (GetUserByIDResponse);
}

// Registration request
message RegisterRequest {
  string email = 1;
  string password = 2;
  string first_name = 3;
  string last_name = 4;
}

// Registration response.
// Contains an auth token for interactive login-style flows; avoid logging it.
message RegisterResponse {
  string token = 1;
  User user = 2;
}

// Login request
message LoginRequest {
  string email = 1;
  string password = 2;
}

// Login response.
// Contains an auth token for interactive login-style flows; avoid logging it.
message LoginResponse {
  string token = 1;
  User user = 2;
}

// Get profile request
message GetProfileRequest {
  string user_id = 1;
}

// Get profile response
message GetProfileResponse {
  User user = 1;
}

// Update profile request
message UpdateProfileRequest {
  string user_id = 1;
  string first_name = 2;
  string last_name = 3;
}

// Update profile response
message UpdateProfileResponse {
  User user = 1;
}

// Get user by ID request
message GetUserByIDRequest {
  string user_id = 1;
}

// Get user by ID response
message GetUserByIDResponse {
  User user = 1;
}

// User model.
// created_at / updated_at are currently serialized as strings by the Go server.
message User {
  string id = 1;
  string email = 2;
  string first_name = 3;
  string last_name = 4;
  string role = 5;
  string created_at = 6;
  string updated_at = 7;
}
