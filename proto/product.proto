syntax = "proto3";

package product;

option go_package = "github.com/NguyenDung278/E-CommerceMicroservicesPlatform/proto";

// Source of truth for Product gRPC contracts. Generated Go files in this
// directory are derived from this schema and should not be edited manually.

// Service definition
service ProductService {
  // Get all products
  rpc GetProducts (GetProductsRequest) returns (GetProductsResponse);
  
  // Get product by ID
  rpc GetProductByID (GetProductByIDRequest) returns (GetProductByIDResponse);
  
  // Create product (admin only)
  rpc CreateProduct (CreateProductRequest) returns (CreateProductResponse);
  
  // Update product (admin only)
  rpc UpdateProduct (UpdateProductRequest) returns (UpdateProductResponse);
  
  // Delete product (admin only)
  rpc DeleteProduct (DeleteProductRequest) returns (DeleteProductResponse);
  
  // Search products
  rpc SearchProducts (SearchProductsRequest) returns (SearchProductsResponse);
}

// Get products request.
//
// NOTE: This is offset/page-style pagination, which is different from the
// cursor-based shape used by some HTTP catalog endpoints in the repo.
message GetProductsRequest {
  int32 page = 1;
  int32 limit = 2;
  string category = 3;
  string sort_by = 4;
}

// Get products response
message GetProductsResponse {
  repeated Product products = 1;
  int32 total_count = 2;
  int32 page = 3;
  int32 limit = 4;
}

// Get product by ID request
message GetProductByIDRequest {
  string product_id = 1;
}

// Get product by ID response
message GetProductByIDResponse {
  Product product = 1;
}

// Create product request
message CreateProductRequest {
  string name = 1;
  string description = 2;
  float price = 3;
  string category = 4;
  int32 stock_quantity = 5;
  string image_url = 6;
}

// Create product response
message CreateProductResponse {
  Product product = 1;
}

// Update product request.
//
// IMPORTANT: Because this schema uses plain proto3 scalar fields (string/float/
// int32) instead of optional/wrapper types, the contract behaves closer to a
// full snapshot update than a partial patch update. Callers should be careful
// not to overwrite fields unintentionally with zero values.
message UpdateProductRequest {
  string product_id = 1;
  string name = 2;
  string description = 3;
  float price = 4;
  string category = 5;
  int32 stock_quantity = 6;
  string image_url = 7;
}

// Update product response
message UpdateProductResponse {
  Product product = 1;
}

// Delete product request
message DeleteProductRequest {
  string product_id = 1;
}

// Delete product response
message DeleteProductResponse {
  bool success = 1;
}

// Search products request
message SearchProductsRequest {
  string query = 1;
  int32 page = 2;
  int32 limit = 3;
}

// Search products response
message SearchProductsResponse {
  repeated Product products = 1;
  int32 total_count = 2;
  int32 page = 3;
  int32 limit = 4;
}

// Product model.
//
// Compatibility note:
// - price is currently encoded as float, which is convenient but not ideal for money
// - created_at / updated_at are ISO-8601 strings emitted by the current Go server
// Future improvements should prefer additive migration instead of changing the
// meaning or type of these existing fields in place.
message Product {
  string id = 1;
  string name = 2;
  string description = 3;
  float price = 4;
  string category = 5;
  int32 stock_quantity = 6;
  string image_url = 7;
  string created_at = 8;
  string updated_at = 9;
}
